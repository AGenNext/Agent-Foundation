name: ci

# Runs on an ephemeral, on-demand runner: GitHub spins up a fresh container
# for each push/PR and discards it when the job finishes. This is the
# disposable test runtime for the contract layer. To run the same checks on
# AGenNext's own runtime instead, swap `runs-on` for a self-hosted label backed
# by agent-test-container, or replace the steps below with an agent-composer
# invocation that wraps `buf`.
on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  buf:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Full history so `buf breaking` can diff against the base branch.
          fetch-depth: 0
      - uses: bufbuild/buf-setup-action@a47c93e0b1648d5651a065437926377d060baa99 # v1.50.0
      - name: Resolve dependencies
        run: buf dep update
      - name: Lint contracts
        run: buf lint
      - name: Check for breaking changes
        # Compare the PR against the tip of main. Skipped on pushes to main,
        # where there is no upstream base to diff against.
        if: github.event_name == 'pull_request'
        run: buf breaking --against "https://github.com/${{ github.repository }}.git#branch=${{ github.event.pull_request.base.ref }}"
