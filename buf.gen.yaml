version: v2
managed:
  enabled: true
plugins:
  # Python contracts (consumed by Agent-Research, Agent-Platform services).
  - remote: buf.build/protocolbuffers/python
    out: gen/python
  - remote: buf.build/protocolbuffers/pyi
    out: gen/python
  # TypeScript contracts (consumed by Agent-Dashboard, Agent-Site, registries).
  - remote: buf.build/bufbuild/es
    out: gen/ts
    opt:
      - target=ts
