syntax = "proto3";

package agennext.foundation.v1;

import "google/protobuf/timestamp.proto";

// ArtifactType enumerates the governed business outputs produced by the
// platform from sources, evidence, and decisions.
enum ArtifactType {
  ARTIFACT_TYPE_UNSPECIFIED = 0;
  ARTIFACT_TYPE_PITCH_DECK = 1;
  ARTIFACT_TYPE_PRODUCT_DOC = 2;
  ARTIFACT_TYPE_DEMO_SCRIPT = 3;
  ARTIFACT_TYPE_RFP_RESPONSE = 4;
  ARTIFACT_TYPE_VENDOR_COMPARISON = 5;
}

// Artifact is a governed business output. It carries traceability back to the
// evidence and decisions that produced it, so every artifact can be audited.
message Artifact {
  string id = 1;
  ArtifactType type = 2;
  string title = 3;
  // Where the rendered artifact lives (URL, object-store key, path).
  string content_uri = 4;
  repeated string evidence_ids = 5;
  repeated string decision_ids = 6;
  // Agent or team id that produced the artifact.
  string produced_by = 7;
  google.protobuf.Timestamp created_at = 8;
}
